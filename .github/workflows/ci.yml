name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  APP_ID: io.github.danst0.wifichecker

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libgdk-pixbuf2.0-dev \
            libpoppler-glib-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION=$(cat VERSION)
          TAG=${GITHUB_REF#refs/tags/v}
          if [ "$VERSION" != "$TAG" ]; then
            echo "ERROR: VERSION file ($VERSION) does not match git tag ($TAG)"
            exit 1
          fi

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test

  flatpak:
    name: Flatpak Bundle
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-47
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Generate cargo sources
        run: |
          pip3 install aiohttp toml
          curl -Lo /tmp/flatpak-cargo-generator.py \
            https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py
          python3 /tmp/flatpak-cargo-generator.py Cargo.lock -o cargo-sources.json

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: wifichecker.flatpak
          manifest-path: ${{ env.APP_ID }}.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: true

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: flatpak
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          name: wifichecker.flatpak

      - name: Rename bundle with version
        run: mv wifichecker.flatpak wifichecker-${{ steps.version.outputs.version }}.flatpak

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: wifichecker-${{ steps.version.outputs.version }}.flatpak
          generate_release_notes: true
